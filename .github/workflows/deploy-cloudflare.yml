# ═══════════════════════════════════════════════════════════════
# LinkGuard - GitHub Actions: Deploy to Cloudflare Pages
# ═══════════════════════════════════════════════════════════════
# Triggered on push to main branch.
# Requires secrets: CF_API_TOKEN, CF_ACCOUNT_ID, CF_PAGES_PROJECT_NAME
# ═══════════════════════════════════════════════════════════════

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cf-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_PROJECT_NAME: ${{ secrets.CF_PAGES_PROJECT_NAME || 'linkguard' }}

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Build application
        run: bun run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.APP_URL || 'https://linkguard.pages.dev' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./db/custom.db' }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy .next/standalone --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }}
