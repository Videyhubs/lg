# ═══════════════════════════════════════════════════════════════
# LinkGuard - GitHub Actions: Deploy via Docker to VPS
# ═══════════════════════════════════════════════════════════════
# Triggered on push to main branch.
# Requires secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
# ═══════════════════════════════════════════════════════════════

name: Deploy to VPS (Docker)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync + Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH || '/opt/linkguard' }}
        run: |
          # Sync files to VPS
          rsync -avz --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='db/*.db' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ $VPS_USER@$VPS_HOST:$VPS_PATH/

          # Pull latest, rebuild, and restart
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST << 'EOF'
            cd /opt/linkguard
            docker compose build --no-cache
            docker compose up -d
            echo "✅ Deployment complete!"
            docker compose ps
          EOF

      - name: Health Check
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.VPS_HOST }} || echo "000")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS"
          fi
